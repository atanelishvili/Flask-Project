{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>📝 რეგისტრაცია</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        
        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">მომხმარებლის სახელი *</label>
            <input type="text" name="username" placeholder="მაგ. tamari_atuashvili" required>
        </div>

        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">ელ-ფოსტა *</label>
            <input type="email" name="email" placeholder="მაგ. tamari@example.com" required>
        </div>

        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">ტელეფონის ნომერი</label>
            <input type="text" name="phone" placeholder="მაგ. 599123456">
        </div>

        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">ვინ ხართ თქვენ? *</label>
            <select name="role" required>
                <option value="Visitor">მნახველი / კლიენტი (Visitor)</option>
                <option value="Owner">მესაკუთრე (Owner)</option>
                <option value="Agent">აგენტი (Agent)</option>
            </select>
        </div>

        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">პაროლი *</label>
            <input type="password" name="password" placeholder="შექმენით პაროლი" required>
        </div>

        
        <button type="submit" style="width: 100%; margin-top: 10px;">დარეგისტრირება</button>
        
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #718096;">
            უკვე გაქვთ ანგარიში? <a href="{{ url_for('auth.login') }}" style="color: #007bff; text-decoration: none; font-weight:600;">შედით აქ</a>
        </p>
    </form>
</div>
{% endblock %}
