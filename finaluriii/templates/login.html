{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>🔐 სისტემაში შესვლა</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        
        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">ელ-ფოსტა</label>
            <input type="email" name="email" placeholder="შეიყვანეთ ელ-ფოსტა" required>
        </div>

        
        <div class="form-group">
            <label style="font-weight: 600; display:block; margin-bottom:5px;">პაროლი</label>
            <input type="password" name="password" placeholder="შეიყვანეთ პაროლი" required>
        </div>

        
        <button type="submit" style="width: 100%; margin-top: 10px;">შესვლა</button>
        
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #718096;">
            ჯერ არ ხართ დარეგისტრირებული? <a href="{{ url_for('auth.register') }}" style="color: #007bff; text-decoration: none; font-weight:600;">შექმენით ანგარიში</a>
        </p>
    </form>
</div>
{% endblock %}
